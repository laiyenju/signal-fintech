<!DOCTYPE html>
<html lang="zh-Hant" data-scope="tw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL｜金融科技追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --dark-bg:#0E1116; --dark-surface:#161B22; --dark-surface-2:#1D232C;
    --dark-border:#2A313C; --dark-border-soft:#232A33;
    --dark-text:#ECE8DE; --dark-text-dim:#99A0AC; --dark-text-faint:#757E8E;
  }
  html[data-scope="tw"]{
    --accent:#E8A33D; --accent-ink:#241B0A; --accent-soft:rgba(232,163,61,0.14);
    --accent-strong:#A16713; --accent-cover:#E8A33D;
    --page-bg:#F4EFE4; --page-surface:#FFFDF8; --page-surface-2:#F9F3E7;
    --page-border:#E3D9C2; --page-border-soft:#EAE1CB;
    --page-text:#25211A; --page-text-dim:#6E6656; --page-text-faint:#736B58;
  }
  html[data-scope="global"]{
    --accent:#28786F; --accent-ink:#DAF6F3; --accent-soft:rgba(63,187,172,0.14);
    --accent-strong:#28786F; --accent-cover:#2E8B80;
    --page-bg:#ECF1F2; --page-surface:#FAFDFD; --page-surface-2:#F1F6F6;
    --page-border:#D6E0E1; --page-border-soft:#E2EAEB;
    --page-text:#1A2224; --page-text-dim:#5E6E70; --page-text-faint:#5F6F71;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0; background:var(--page-bg); color:var(--page-text);
    font-family:'Inter', -apple-system, 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; -webkit-font-smoothing:antialiased;
    transition:background 0.35s ease, color 0.35s ease;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--accent-soft); color:var(--page-text); }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.02em; }

  @keyframes blink{ 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
  .cursor{ display:inline-block; animation:blink 1.1s steps(1) infinite; color:var(--accent-cover); }

  header.site{
    position:sticky; top:0; z-index:40; background:rgba(14,17,22,0.92);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--dark-border-soft);
  }
  .site-inner{ max-width:960px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .brand{ display:flex; align-items:baseline; }
  .brand h1{ font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:17px; margin:0; letter-spacing:0.16em; text-transform:uppercase; color:var(--dark-text); }

  .seg{
    position:relative; display:flex; background:var(--dark-surface-2);
    border:1px solid var(--dark-border); border-radius:999px; padding:3px;
    font-family:'IBM Plex Mono', monospace;
  }
  .seg .highlight{
    position:absolute; top:3px; bottom:3px; left:3px; width:calc(50% - 3px);
    background:var(--accent); border-radius:999px;
    transition:transform 0.22s cubic-bezier(.6,.2,.2,1), background 0.3s;
  }
  .seg.on-global .highlight{ transform:translateX(100%); }
  .seg button{
    position:relative; z-index:1; border:none; background:transparent; cursor:pointer;
    padding:7px 16px; font-family:inherit; font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--dark-text-faint); transition:color 0.2s;
  }
  .seg button.active{ color:var(--accent-ink); font-weight:600; }

  /* ---------- cover: full-bleed dark terminal band ---------- */
  .cover-band{
    position:relative; background:var(--dark-bg); color:var(--dark-text);
    border-bottom:1px solid var(--dark-border-soft);
  }
  .cover-band::before{
    content:''; position:absolute; inset:0; pointer-events:none; opacity:0.5;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 3px);
  }
  .cover-band::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(700px 380px at 12% -10%, var(--accent-soft), transparent 60%);
  }
  .cover-inner{ position:relative; max-width:960px; margin:0 auto; padding:40px 24px 44px; }
  .prompt-line{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--dark-text-faint);
    margin:0 0 22px; display:flex; align-items:center; gap:8px;
  }
  .prompt-line .sym{ color:var(--accent-cover); }
  .prompt-line .accent-date{ color:var(--accent-cover); font-weight:600; }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent-cover); display:flex; align-items:center; gap:8px; margin:0 0 14px; }
  .eyebrow::before{ content:''; width:16px; height:1px; background:var(--accent); }
  .eyebrow.is-watch{ color:var(--dark-text-faint); }
  .eyebrow.is-watch::before{ background:var(--dark-text-faint); }

  .cover-band h2{ font-family:'Newsreader', 'Songti TC', 'PMingLiU', serif; font-weight:600; font-style:italic; font-size:clamp(28px, 4.2vw, 44px); line-height:1.16; margin:0 0 24px; max-width:22ch; color:var(--dark-text); }
  .story-copy p{ margin:0 0 12px; font-size:15.5px; line-height:1.85; }
  .cover-band .story-copy p{ color:var(--dark-text); }
  .story-copy p:last-child{ margin-bottom:0; }

  .panel-label{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.1em; margin:22px 0 10px; }
  .cover-band .panel-label{ color:var(--dark-text-faint); }

  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px; }
  .chip{ display:inline-flex; align-items:center; gap:7px; padding:6px 11px; border-radius:3px; font-size:12.5px; transition:all 0.15s ease; }
  .cover-band .chip{ background:var(--dark-surface); border:1px solid var(--dark-border); color:var(--dark-text-dim); }
  .cover-band .chip .src-name{ color:var(--dark-text); }
  .chip .src-name{ font-weight:600; }
  .chip .arrow{ opacity:0.45; font-size:11px; transition:opacity 0.2s ease; }
  .chip:hover{ border-color:var(--accent-strong); }
  .chip:hover .src-name{ color:var(--page-text); }
  .cover-band .chip:hover .src-name{ color:var(--dark-text); }
  .chip:hover .arrow{ opacity:0.9; }

  .social-wall{ display:grid; gap:10px; margin-bottom:6px; }
  .social-card{ border-radius:6px; padding:14px 16px; font-size:13.5px; line-height:1.65; display:block; border-left:2px solid transparent; transition:border-color 0.2s ease; }
  .cover-band .social-card{ background:var(--dark-surface); border:1px solid var(--dark-border-soft); border-left:2px solid transparent; }
  .social-card:hover{ border-left-color:var(--accent-strong); }
  .social-card .who{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--page-text); margin-bottom:6px; display:flex; gap:8px; align-items:center; }
  .cover-band .social-card .who{ color:var(--dark-text); }
  .social-card .who .plat{ font-weight:400; text-transform:uppercase; font-size:10px; border:1px solid; border-radius:2px; padding:1px 5px; }
  .cover-band .social-card .who .plat{ color:var(--dark-text-faint); border-color:var(--dark-border); }
  .cover-band .social-card p{ color:var(--dark-text-dim); }
  .social-card p{ margin:0; }

  /* ---------- ask-AI action row ---------- */
  .ask-wrap{ position:relative; display:inline-flex; }
  .ask-main, .ask-chevron-btn{
    display:flex; align-items:center; gap:7px; font-family:'Inter', -apple-system, 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; font-size:12.5px;
    padding:8px 13px; cursor:pointer; background:transparent; color:inherit;
    transition:border-color 0.32s cubic-bezier(.4,0,.2,1), color 0.32s cubic-bezier(.4,0,.2,1), background-color 0.32s cubic-bezier(.4,0,.2,1);
  }
  .ask-main{ border-radius:7px 0 0 7px; border:1px solid; border-right:none; min-width:140px; justify-content:flex-start; }
  .ask-chevron-btn{ border-radius:0 7px 7px 0; border:1px solid; padding:8px 9px; }
  .cover-band .ask-main, .cover-band .ask-chevron-btn{ border-color:var(--dark-border); color:var(--dark-text-dim); }
  .story .ask-main, .story .ask-chevron-btn{ border-color:var(--page-border); color:var(--page-text-dim); }
  .ask-main svg, .ask-chevron-btn svg{ width:14px; height:14px; flex-shrink:0; }
  .ask-chevron-btn svg{ transition:transform 0.32s cubic-bezier(.4,0,.2,1); }
  .ask-chevron-btn.open svg{ transform:rotate(180deg); }
  .ask-label{ transition:opacity 0.15s ease; }
  .ask-menu{
    position:absolute; top:calc(100% + 8px); left:0; min-width:190px; z-index:20;
    border-radius:8px; padding:5px;
    box-shadow:0 14px 32px -6px rgba(0,0,0,0.4);
    opacity:0; transform:translateY(-5px); pointer-events:none;
    transition:opacity 0.2s cubic-bezier(.4,0,.2,1), transform 0.2s cubic-bezier(.4,0,.2,1);
  }
  .cover-band .ask-menu{ background:var(--dark-surface); border:1px solid var(--dark-border); }
  .story .ask-menu{ background:var(--page-surface); border:1px solid var(--page-border); }
  .ask-menu.open{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .ask-menu button{
    display:flex; width:100%; align-items:center; gap:8px; text-align:left; border:none;
    background:transparent; cursor:pointer; font-family:'Inter', -apple-system, 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; font-size:12.5px;
    padding:8px 9px; border-radius:5px; color:inherit; transition:background 0.2s ease, color 0.2s ease;
  }
  .cover-band .ask-menu button{ color:var(--dark-text-dim); }
  .story .ask-menu button{ color:var(--page-text-dim); }
  .ask-menu button:hover{ background:var(--page-border-soft); }
  .cover-band .ask-menu button:hover{ background:var(--dark-border-soft); }

  /* ---------- tri-column: ask-AI / sources / social (cover only) ---------- */
  .tri-row{ display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin:22px 0 0; }
  .tri-toggle{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Inter', -apple-system, 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; font-size:12.5px; padding:8px 13px; border-radius:7px;
    border:1px solid; cursor:pointer; background:transparent; color:inherit;
    transition:border-color 0.32s cubic-bezier(.4,0,.2,1), color 0.32s cubic-bezier(.4,0,.2,1), background-color 0.32s cubic-bezier(.4,0,.2,1);
  }
  .tri-toggle[data-toggle="source"]{ margin-left:auto; }
  .cover-band .tri-toggle{ border-color:var(--dark-border); color:var(--dark-text-dim); }
  .tri-toggle:hover{ border-color:var(--accent-strong); color:var(--page-text); background:var(--accent-soft); }
  .tri-toggle.active{ border-color:var(--accent-strong); color:var(--page-text); background:var(--accent-soft); }
  .cover-band .tri-toggle:hover, .cover-band .tri-toggle.active{ color:var(--dark-text); }
  .tri-toggle svg{ width:14px; height:14px; flex-shrink:0; transition:transform 0.32s cubic-bezier(.4,0,.2,1); }
  .tri-toggle.active svg{ transform:rotate(180deg); }
  .tri-content{ display:none; margin-top:18px; }
  .tri-content.open{ display:block; animation:triFade 0.22s ease; }
  @keyframes triFade{ from{ opacity:0; transform:translateY(-5px); } to{ opacity:1; transform:translateY(0); } }
  .cover-band .tri-empty{ color:var(--dark-text-faint); font-size:13px; margin:0; }
  .story .tri-empty{ color:var(--page-text-faint); font-size:13px; margin:0; }

  details.context{ border-radius:6px; padding:14px 16px; margin-top:16px; }
  .cover-band details.context{ background:var(--dark-surface); border:1px solid var(--dark-border-soft); }
  details.context summary{ cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; font-family:'IBM Plex Mono', monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em; }
  .cover-band details.context summary{ color:var(--dark-text-dim); }
  details.context summary::-webkit-details-marker{ display:none; }
  details.context summary::after{ content:'展開 ▾'; color:var(--dark-text-faint); }
  details.context[open] summary::after{ content:'收合 ▴'; }
  .context-item{ padding:14px 0 0; margin-top:14px; }
  .cover-band .context-item{ border-top:1px solid var(--dark-border-soft); }
  .context-item:first-of-type{ border-top:none; margin-top:12px; padding-top:0; }
  .context-item .cdate{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--dark-text-faint); }
  .context-item h4{ font-family:'Newsreader', 'Songti TC', 'PMingLiU', serif; font-weight:500; font-size:16px; margin:4px 0 6px; color:var(--dark-text); }
  .context-item p{ margin:0; font-size:13.5px; line-height:1.7; color:var(--dark-text-dim); }

  main{ max-width:960px; margin:0 auto; padding:0 24px 100px; }

  .rail-header{ display:flex; align-items:baseline; padding:48px 0 22px; }
  .rail-header h3{ font-family:'Newsreader', 'Songti TC', 'PMingLiU', serif; font-style:italic; font-weight:500; font-size:22px; margin:0; color:var(--page-text); display:flex; align-items:baseline; gap:12px; }
  .rail-header .count{ font-family:'IBM Plex Mono', monospace; font-size:13px; font-style:normal; color:var(--page-text); background:var(--accent-soft); padding:3px 11px; border-radius:999px; letter-spacing:0.03em; }

  .rail{ position:relative; padding-left:34px; }
  .rail::before{ content:''; position:absolute; left:9px; top:6px; bottom:6px; width:1px; background:linear-gradient(var(--page-border), var(--page-border) 70%, transparent); }
  .story{ position:relative; padding-bottom:38px; }
  .story:last-child{ padding-bottom:4px; }
  .story .dot{ position:absolute; left:-34px; top:5px; width:19px; height:19px; border-radius:50%; background:var(--page-surface); border:1px solid var(--page-border); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono', monospace; font-size:9.5px; color:var(--page-text-faint); }
  .story.rank-1 .dot{ border-color:var(--accent-strong); color:var(--page-text); box-shadow:0 0 0 3px var(--accent-soft); }
  .story .story-meta{ display:flex; gap:12px; align-items:center; margin-bottom:8px; font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--page-text-faint); }
  .story h4{ font-family:'Newsreader', 'Songti TC', 'PMingLiU', serif; font-weight:600; font-size:19px; margin:0 0 12px; line-height:1.35; color:var(--page-text); }
  .story .story-copy p{ font-size:14.5px; color:var(--page-text-dim); }
  .story .panel-label{ color:var(--page-text-faint); margin:16px 0 10px; }

  .story .chip{ background:var(--page-surface-2); border:1px solid var(--page-border); color:var(--page-text-dim); }
  .story .chip .src-name{ color:var(--page-text); }
  .story .chip:hover .src-name{ color:var(--page-text); }
  .story .chip:hover{ border-color:var(--accent-strong); }
  .story .social-card{ background:var(--page-surface); border:1px solid var(--page-border-soft); border-left:2px solid transparent; }
  .story .social-card:hover{ border-left-color:var(--accent-strong); }
  .story .social-card .who .plat{ color:var(--page-text-faint); border-color:var(--page-border); }
  .story .social-card p{ color:var(--page-text-dim); }
  .story details.context{ background:var(--page-surface); border:1px solid var(--page-border-soft); margin-top:18px; }
  .story details.context summary{ color:var(--page-text-dim); }
  .story details.context summary::after{ color:var(--page-text-faint); }
  .story .context-item{ border-top:1px solid var(--page-border-soft); }
  .story .context-item:first-of-type{ border-top:none; }
  .story .context-item h4{ font-size:16px; margin:4px 0 6px; color:var(--page-text); }
  .story .context-item .cdate{ color:var(--page-text-faint); }
  .story .context-item p{ color:var(--page-text-dim); }
  details.more-stories{ margin:6px 0 0 0; }
  details.more-stories > summary{ cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono', monospace; font-size:12.5px; letter-spacing:0.03em; color:var(--page-text-dim); padding:10px 0 24px; }
  details.more-stories > summary:hover{ color:var(--page-text); }
  details.more-stories > summary::-webkit-details-marker{ display:none; }
  details.more-stories > summary::after{ content:'▾'; color:var(--page-text-faint); }
  details.more-stories[open] > summary::after{ content:'▴'; }

  details.more summary{ cursor:pointer; list-style:none; font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--page-text-faint); text-transform:uppercase; letter-spacing:0.06em; display:inline-flex; gap:6px; align-items:center; border-bottom:1px dashed var(--page-border); padding-bottom:2px; }
  details.more summary::-webkit-details-marker{ display:none; }
  details.more summary::before{ content:'▸'; }
  details.more[open] summary::before{ content:'▾'; }
  details.more .more-inner{ padding-top:16px; display:grid; gap:14px; }

  .sources-panel{ margin-top:60px; padding:28px 26px; border:1px solid var(--page-border-soft); border-radius:8px; background:var(--page-surface); }
  .sources-panel h5{ font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--page-text-faint); margin:0 0 16px; }
  .source-category{ margin-bottom:22px; }
  .source-category:last-child{ margin-bottom:0; }
  .source-category-label{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--page-text-faint); margin:0 0 10px; }
  .source-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:10px; }
  .source-grid a.src{ display:block; font-size:13px; color:var(--page-text-dim); padding:8px 10px; border:1px solid var(--page-border-soft); border-radius:4px; background:var(--page-surface-2); transition:border-color 0.2s ease, color 0.2s ease; }
  .source-grid a.src:hover{ border-color:var(--accent-strong); color:var(--page-text); }
  .note{ margin-top:18px; font-size:12px; color:var(--page-text-faint); line-height:1.7; }

  footer.site{ max-width:960px; margin:0 auto; padding:30px 24px 60px; color:var(--page-text-faint); font-size:11.5px; font-family:'IBM Plex Mono', monospace; display:flex; justify-content:space-between; }

  @media (max-width:560px){
    .site-inner{ padding:14px 18px; }
    main{ padding:0 18px 80px; }
    .cover-inner{ padding:30px 18px 34px; }
    .rail{ padding-left:26px; }
    .story .dot{ left:-26px; width:16px; height:16px; }
  }
</style>
</head>
<body>

<header class="site">
  <div class="site-inner">
    <div class="brand">
      <h1>SIGNAL<span class="cursor">_</span></h1>
    </div>
    <div class="seg" id="segToggle">
      <span class="highlight"></span>
      <button id="btnTW" class="active">台灣</button>
      <button id="btnGlobal">國際</button>
    </div>
  </div>
</header>

<section class="cover-band">
  <div class="cover-inner" id="coverSection"></div>
</section>

<main>
  <section class="rail-header">
    <h3>本週要聞<span class="count mono" id="weekCount"></span></h3>
  </section>

  <div class="rail" id="railList"></div>

  <section class="sources-panel">
    <h5>追蹤來源清單</h5>
    <div id="sourceGroups"></div>
    <p class="note">
      本清單為台灣／國際共用，僅收錄已確認提供 RSS 的來源，依類別整理；尚未確認或確認沒有 RSS 的來源暫不列入，待日後補上爬蟲或網頁監控後再加入。
      正式啟用後，「本日最重點」將由前一日產生的當日最重大新聞遞補至「本週要聞」清單第一則，並依此清單加上 X／Reddit／Hacker News（黑客新聞）上相關議題的熱門貼文與意見領袖（KOL）留言即時彙整。
      若當天沒有夠格的重大新聞，標籤會改顯示為「本日觀察」（將資料中 <span class="mono">cover.tier</span> 設為 <span class="mono">"watch"</span> 即可）。
    </p>
  </section>
</main>

<footer class="site">
  <span>SIGNAL / FINTECH DESK</span>
  <span id="updatedStamp" class="mono"></span>
  <span id="todayDate"></span>
</footer>

<script>
let DATA = null;

const SOURCES = {
  "新聞媒體": [
    {name:"TechCrunch", url:"https://techcrunch.com/"},
    {name:"Bankless", url:"https://www.bankless.com/"},
    {name:"Techmeme", url:"https://www.techmeme.com/"},
    {name:"PYMNTS", url:"https://www.pymnts.com/"},
    {name:"Finextra", url:"https://www.finextra.com/"},
    {name:"Banking Dive", url:"https://www.bankingdive.com/"},
    {name:"The Fintech Times", url:"https://thefintechtimes.com/"},
    {name:"CoinDesk", url:"https://www.coindesk.com/"},
    {name:"The Block", url:"https://www.theblock.co/"},
    {name:"Bloomberg Markets", url:"https://www.bloomberg.com/markets"},
    {name:"Hacker News", url:"https://news.ycombinator.com/"},
    {name:"經濟日報", url:"https://money.udn.com/money/index"},
    {name:"科技新報", url:"https://technews.tw/"},
    {name:"公視新聞", url:"https://news.pts.org.tw/"},
    {name:"Yahoo 財經", url:"https://tw.news.yahoo.com/finance/"},
    {name:"中央社 CNA", url:"https://www.cna.com.tw/about/rss.aspx"}
  ],
  "分析評論": [
    {name:"TLDR AI", url:"https://tldr.tech/ai"},
    {name:"TLDR Fintech", url:"https://tldr.tech/fintech"},
    {name:"TLDR Dev", url:"https://tldr.tech/dev"}
  ],
  "監管機構": [
    {name:"台灣金管會", url:"https://www.fsc.gov.tw/"},
    {name:"美國 SEC", url:"https://www.sec.gov/"},
    {name:"歐盟 ESMA", url:"https://www.esma.europa.eu/"},
    {name:"歐盟 EBA", url:"https://www.eba.europa.eu/"},
    {name:"英國 FCA", url:"https://www.fca.org.uk/"},
    {name:"日本金融庁", url:"https://www.fsa.go.jp/en/"},
    {name:"BIS", url:"https://www.bis.org/"}
  ],
  "公司來源": [
    {name:"Stripe", url:"https://stripe.com/blog"},
    {name:"PayPal Newsroom", url:"https://newsroom.paypal-corp.com/"},
    {name:"MaiCoin Blog", url:"https://blog.maicoin.com/"}
  ],
  "社群評論": [
    {name:"Hacker News 留言", url:"https://news.ycombinator.com/newcomments"}
  ]
};

let scope = 'tw';

const CJK_RANGE = '\\u4e00-\\u9fff\\u3400-\\u4dbf\\uf900-\\ufaff\\u3040-\\u30ff';
const CJK_BEFORE_LATIN = new RegExp(`([${CJK_RANGE}])([A-Za-z0-9])`, 'g');
const CJK_AFTER_LATIN = new RegExp(`([A-Za-z0-9])([${CJK_RANGE}])`, 'g');
function cjkSpace(text){
  if(!text) return text;
  return text.replace(CJK_BEFORE_LATIN, '$1 $2').replace(CJK_AFTER_LATIN, '$1 $2');
}
function storyCopy(paras){
  return `<div class="story-copy">${paras.map(p => `<p>${cjkSpace(p)}</p>`).join('')}</div>`;
}
function stripHtml(html){
  return html.replace(/<[^>]+>/g, '').trim();
}
function weekdayZh(dateStr){
  const map = ['日','一','二','三','四','五','六'];
  const d = new Date(dateStr + 'T00:00:00');
  return '週' + map[d.getDay()];
}
let summaryMap = {};
function buildAskText(title, paras, sources, social){
  const body = paras.map(p => stripHtml(p)).join('\n\n');
  const sourceLines = sources.map(s => `- ${s.name}｜${s.url}`).join('\n');
  const socialLines = social && social.length
    ? social.map(s => `- [${s.plat}] ${s.who}：${stripHtml(s.body)}（${s.url}）`).join('\n')
    : '（無相關社群討論）';
  return [
    `新聞標題：${title}`,
    ``,
    `內容摘要：`,
    body,
    ``,
    `資訊來源：`,
    sourceLines,
    ``,
    `社群討論（X／Reddit／Hacker News）：`,
    socialLines,
    ``,
    `請根據以上資訊，幫我更深入分析這則新聞的脈絡、可能影響，以及後續值得留意的發展。`
  ].join('\n');
}
function registerAskText(id, title, paras, sources, social){
  summaryMap[id] = buildAskText(title, paras, sources, social || []);
}
function askWrapMarkup(id){
  return `
    <div class="ask-wrap" data-id="${id}">
      <button class="ask-main" data-action="copy" title="複製這則新聞的完整資訊，用來詢問 AI">
        <svg class="ask-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="6" width="11" height="11" rx="2"/><path d="M4 13.5V5.5C4 4.4 4.9 3.5 6 3.5H13"/></svg>
        <span class="ask-label">複製詢問 AI</span>
      </button>
      <button class="ask-chevron-btn" data-action="toggle" aria-haspopup="true" aria-label="選擇要開啟的 AI">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 8l5 5 5-5"/></svg>
      </button>
      <div class="ask-menu">
        <button data-action="chatgpt">在 ChatGPT 提問</button>
        <button data-action="claude">在 Claude 提問</button>
        <button data-action="gemini">在 Gemini 提問</button>
      </div>
    </div>`;
}
function chevronSvg(){
  return `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 8l5 5 5-5"/></svg>`;
}
function triRow(id, title, paras, sources, social){
  registerAskText(id, title, paras, sources, social);
  const soc = social || [];
  return `
  <div class="tri-row">
    ${askWrapMarkup(id)}
    <button class="tri-toggle" data-toggle="source" data-id="${id}">
      <span>來源 (${sources.length})</span>${chevronSvg()}
    </button>
    <button class="tri-toggle" data-toggle="social" data-id="${id}">
      <span>社群討論 (${soc.length})</span>${chevronSvg()}
    </button>
  </div>
  <div class="tri-content" data-content="source" data-id="${id}">${chips(sources)}</div>
  <div class="tri-content" data-content="social" data-id="${id}">${soc.length ? socialWall(soc) : '<p class="tri-empty">目前沒有相關社群討論。</p>'}</div>`;
}


function chips(sources){
  return `<div class="chip-row">${sources.map(s => `<a class="chip" href="${s.url}" target="_blank" rel="noopener"><span class="src-name">${s.name}</span>｜${s.title || '前往來源首頁'}<span class="arrow">↗</span></a>`).join('')}</div>`;
}
function socialWall(list){
  if(!list.length) return '';
  return `<div class="social-wall">${list.map(s => `
    <a class="social-card" href="${s.url}" target="_blank" rel="noopener">
      <div class="who">${s.who}<span class="plat">${s.plat}</span></div>
      <p>${s.body}</p>
    </a>`).join('')}</div>`;
}

function render(){
  if(!DATA){ return; }
  summaryMap = {};
  const d = DATA[scope];
  document.documentElement.setAttribute('data-scope', scope);

  document.getElementById('coverSection').innerHTML = `
    <p class="prompt-line"><span class="sym">$</span> signal fetch --scope=${scope} --date=<span class="accent-date">${d.cover.date}（${weekdayZh(d.cover.date)}）</span><span class="cursor">_</span></p>
    <p class="eyebrow${d.cover.tier === 'watch' ? ' is-watch' : ''}">${d.cover.tier === 'watch' ? '本日觀察' : '本日最重點'}</p>
    <h2>${cjkSpace(d.cover.title)}</h2>
    ${storyCopy(d.cover.paras)}
    ${triRow('cover', d.cover.title, d.cover.paras, d.sources, d.coverSocial)}
    ${d.context.length ? `
    <details class="context">
      <summary>過往相關新聞 · ${d.context.length} 件</summary>
      ${d.context.map(c => `
        <div class="context-item">
          <span class="cdate mono">${c.date}</span>
          <h4>${cjkSpace(c.title)}</h4>
          <p>${cjkSpace(c.body)}</p>
        </div>`).join('')}
    </details>` : ''}
  `;

  const sortedOthers = [...d.others].sort((a, b) => b.date.localeCompare(a.date));
  document.getElementById('weekCount').textContent = `${sortedOthers.length} 則`;

  const storyCard = (s, i) => `
    <div class="story ${i===0 ? 'rank-1' : ''}">
      <span class="dot">${String(i+2).padStart(2,'0')}</span>
      <div class="story-meta"><span>${s.date}（${weekdayZh(s.date)}）</span></div>
      <h4>${cjkSpace(s.title)}</h4>
      ${storyCopy(s.paras)}
      ${triRow('story-'+i, s.title, s.paras, s.sources, s.social)}
      ${s.context && s.context.length ? `
      <details class="context">
        <summary>過往相關新聞 · ${s.context.length} 件</summary>
        ${s.context.map(c => `
          <div class="context-item">
            <span class="cdate mono">${c.date}</span>
            <h4>${cjkSpace(c.title)}</h4>
            <p>${cjkSpace(c.body)}</p>
          </div>`).join('')}
      </details>` : ''}
    </div>
  `;

  const VISIBLE_COUNT = 5;
  const visible = sortedOthers.slice(0, VISIBLE_COUNT).map(storyCard).join('');
  const rest = sortedOthers.slice(VISIBLE_COUNT);
  const restHtml = rest.length ? `
    <details class="more-stories">
      <summary>顯示更多本週要聞・還有 ${rest.length} 則</summary>
      ${rest.map((s, i) => storyCard(s, i + VISIBLE_COUNT)).join('')}
    </details>` : '';

  document.getElementById('railList').innerHTML = visible + restHtml;

  document.getElementById('btnTW').classList.toggle('active', scope==='tw');
  document.getElementById('btnGlobal').classList.toggle('active', scope==='global');
  document.getElementById('segToggle').classList.toggle('on-global', scope==='global');
}

function renderSources(){
  document.getElementById('sourceGroups').innerHTML = Object.keys(SOURCES).map(cat => `
    <div class="source-category">
      <p class="source-category-label">${cat}（${SOURCES[cat].length}）</p>
      <div class="source-grid">
        ${SOURCES[cat].map(s => `<a class="src" href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`).join('')}
      </div>
    </div>
  `).join('');
}

document.getElementById('btnTW').addEventListener('click', () => { scope='tw'; render(); });
document.getElementById('btnGlobal').addEventListener('click', () => { scope='global'; render(); });
document.getElementById('todayDate').textContent = new Date().toISOString().slice(0,10);

const AI_URLS = {
  chatgpt: 'https://chatgpt.com/',
  claude: 'https://claude.ai/new',
  gemini: 'https://gemini.google.com/app'
};
const CHECK_ICON = '<path d="M4 10.5l4 4 8-9"/>';

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
}
function flashCopied(wrap, message){
  const mainBtn = wrap.querySelector('.ask-main');
  const label = mainBtn.querySelector('.ask-label');
  const icon = mainBtn.querySelector('.ask-icon');
  if(!label || !icon) return;
  if(!mainBtn.dataset.original){
    mainBtn.dataset.original = label.textContent;
    mainBtn.dataset.originalIcon = icon.innerHTML;
  }
  clearTimeout(mainBtn._resetT);
  label.textContent = message;
  icon.innerHTML = CHECK_ICON;
  mainBtn.classList.add('copied');
  mainBtn._resetT = setTimeout(() => {
    label.textContent = mainBtn.dataset.original;
    icon.innerHTML = mainBtn.dataset.originalIcon;
    mainBtn.classList.remove('copied');
  }, 1700);
}
function closeAllMenus(exceptWrap){
  document.querySelectorAll('.ask-wrap').forEach(w => {
    if(w === exceptWrap) return;
    const m = w.querySelector('.ask-menu');
    const c = w.querySelector('.ask-chevron-btn');
    if(m) m.classList.remove('open');
    if(c) c.classList.remove('open');
    w.classList.remove('menu-open');
  });
}

document.addEventListener('click', (e) => {
  const triBtn = e.target.closest('.tri-toggle');
  if(triBtn){
    const type = triBtn.dataset.toggle;
    const id = triBtn.dataset.id;
    const wasActive = triBtn.classList.contains('active');
    const row = triBtn.closest('.tri-row');
    row.querySelectorAll('.tri-toggle').forEach(b => b.classList.remove('active'));
    document.querySelectorAll(`.tri-content[data-id="${id}"]`).forEach(c => c.classList.remove('open'));
    if(!wasActive){
      triBtn.classList.add('active');
      const content = document.querySelector(`.tri-content[data-content="${type}"][data-id="${id}"]`);
      if(content) content.classList.add('open');
    }
    return;
  }

  const wrap = e.target.closest('.ask-wrap');
  if(!wrap){ closeAllMenus(); return; }
  const id = wrap.dataset.id;
  const btn = e.target.closest('button');
  if(!btn){ return; }
  const action = btn.dataset.action;
  const menu = wrap.querySelector('.ask-menu');
  const chevronBtn = wrap.querySelector('.ask-chevron-btn');

  if(action === 'copy'){
    copyText(summaryMap[id] || '');
    flashCopied(wrap, '已複製');
    closeAllMenus();
  } else if(action === 'toggle'){
    const willOpen = !menu.classList.contains('open');
    closeAllMenus(willOpen ? wrap : null);
    menu.classList.toggle('open', willOpen);
    chevronBtn.classList.toggle('open', willOpen);
    wrap.classList.toggle('menu-open', willOpen);
  } else if(AI_URLS[action]){
    copyText(summaryMap[id] || '');
    window.open(AI_URLS[action], '_blank', 'noopener');
    flashCopied(wrap, '已複製，去貼上');
    closeAllMenus();
  }
});

renderSources();

// 內容改為開站時載入外部 data.json（由排程任務每小時覆寫產生）。
// data.json 必須與本頁部署在同一位置（同一 GitHub Pages repo 根目錄），
// 否則瀏覽器會因跨網域限制而無法讀取。
// 加上時間戳參數避免瀏覽器/CDN 快取到舊檔。
fetch('data.json?t=' + Date.now())
  .then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(d => {
    DATA = d;
    render();
    const stamp = document.getElementById('updatedStamp');
    if(stamp && d._generated_at){
      const dt = new Date(d._generated_at);
      stamp.textContent = '內容更新於 ' + dt.toLocaleString('zh-TW', { hour12:false });
    }
  })
  .catch(err => {
    const el = document.getElementById('coverSection');
    if(el){
      el.innerHTML = '<p class="eyebrow">暫時無法載入最新內容</p>'
        + '<p class="note">請稍後重新整理頁面。（' + err.message + '）</p>';
    }
  });
</script>
